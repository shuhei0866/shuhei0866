<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" role="img" aria-labelledby="title desc">
  <title id="title">GitHub activity metrics placeholder</title>
  <desc id="desc">A placeholder card shown until the metrics workflow writes the generated activity snapshot.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ee"/>
      <stop offset="100%" stop-color="#efe8dd"/>
    </linearGradient>
  </defs>
  <rect width="860" height="420" rx="24" fill="url(#bg)"/>
  <rect x="24" y="24" width="812" height="372" rx="18" fill="#fffdf8" stroke="#d7cabb" stroke-width="2"/>
  <circle cx="76" cy="74" r="8" fill="#c46d3f"/>
  <circle cx="102" cy="74" r="8" fill="#d6a25a"/>
  <circle cx="128" cy="74" r="8" fill="#8b9a46"/>
  <text x="56" y="132" fill="#2f2b28" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="34" font-weight="700">
    Activity snapshot will appear here
  </text>
  <text x="56" y="176" fill="#5f5750" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">
    Add a repository secret named METRICS_TOKEN, then run the Metrics workflow once.
  </text>
  <text x="56" y="210" fill="#5f5750" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">
    The generated card will summarize habits, code churn, follow-up, and notable OSS work.
  </text>
  <rect x="56" y="254" width="748" height="98" rx="16" fill="#f4eee4" stroke="#d7cabb" stroke-width="1.5"/>
  <text x="84" y="295" fill="#2f2b28" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="700">
    Suggested token setup
  </text>
  <text x="84" y="327" fill="#5f5750" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">
    Personal access token (classic), no scopes, stored as METRICS_TOKEN in this repository.
  </text>
  <text x="84" y="358" fill="#5f5750" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">
    Metrics action pinned to lowlighter/metrics v3.34 commit 65836723097537a54cd8eb90f61839426b4266b6.
  </text>
</svg>
