name: Metrics

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

concurrency:
  group: metrics
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check configuration
        id: config
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          if [ -z "$METRICS_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "METRICS_TOKEN is not configured; skipping metrics generation."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate metrics
        if: steps.config.outputs.configured == 'true'
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.svg
          base: ""
          config_timezone: Asia/Tokyo
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 6
          plugin_lines: yes
          plugin_lines_delay: 30
          plugin_lines_sections: repositories,history
          plugin_lines_repositories_limit: 6
          plugin_lines_history_limit: 1
          plugin_followup: yes
          plugin_followup_sections: user
          plugin_notable: yes
          plugin_notable_repositories: yes
          plugin_notable_types: commit,pull_request
